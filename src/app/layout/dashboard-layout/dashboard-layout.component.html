<div class="dashboard-layout">

    <div
        class="overlay"
        [class.show]="isSidebarOpen"
        (click)="closeSidebar()">
    </div>

    <app-sidebar
        [isOpen]="isSidebarOpen"
        (closeSidebar)="closeSidebar()">
    </app-sidebar>

    <div class="main-content">

        <app-header
            (toggleSidebar)="toggleSidebar()">
        </app-header>

        <div class="page-content">

            <router-outlet></router-outlet>

        </div>

    </div>

</div>
