<div class="order-card card border-0 shadow-sm h-100">

    <div class="card-body p-3">

        <div class="d-flex justify-content-between align-items-start mb-2">

            <h5 class="card-title mb-0 text-primary fw-bold">
                {{ order.orderNumber }}
            </h5>

            <div class="d-flex align-items-center gap-2">


                <button
    class="ai-btn"
    (click)="openAi()">

    <i class="fa-solid fa-robot"></i>

</button>

            </div>

        </div>

        <div class="customer-info mb-3">

            <div class="d-flex align-items-center mb-1">
                <i class="fas fa-user text-secondary me-2"></i>
                <span class="fw-semibold">{{ order.customerName }}</span>
            </div>

            <div class="d-flex align-items-center">
                <i class="fas fa-store text-secondary me-2"></i>
                <span class="text-muted small">{{ order.channel }}</span>
            </div>

        </div>

        <div class="order-meta d-flex justify-content-between align-items-center pt-2 border-top">

            <div class="price">

                <span class="fw-bold text-success">
                    {{ order.totalPrice | currency }}
                </span>

            </div>

        </div>

    </div>

</div>

<app-ai-assistant

    [isOpen]="showAi"

    [order]="order"

    [ai]="ai"

    (close)="closeAi()"

    (retry)="retry()">

</app-ai-assistant>
